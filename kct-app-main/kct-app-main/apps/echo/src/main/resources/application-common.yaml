server:
  port: 9121

spring:
  application:
    name: echo
  web:
    error:
      # Exception error message 처리
      include-message: always
      include-binding-errors: always
      whitelabel:
        enabled: false
  # Consul configuration
  config:
    import: "consul:"
  cloud:
    consul:
      discovery:
        enabled: true
        instance-id: "${spring.application.name}:${random.value}"
        health-check-path: "/meter/health"
      config:
        enabled: true
        format: YAML
        default-context: application
        prefixes:
          - config
          - ${spring.application.name}


# Springdoc configuration
springdoc:
  override-with-generic-response: false
  default-produces-media-type: application/json
  api-docs:
    resolve-extensions-properties: true
    groups:
      enabled: true
  swagger-ui:
    path: '/swagger-ui.html'
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    displayRequestDuration: true
    groups-order: DESC

# Tracing
management:
  endpoint:
    health:
      access: read_only
    prometheus:
      access: read_only
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: "health,prometheus"
      base-path: "/meter"
  otlp:
    metrics:
      export:
        enabled: false  # Open-telemetry metric push 를 사용하지 않는다 (대신 prometheus 를 사용한다)
  tracing:
    export:
      enabled: true
    sampling:
      probability: 1.0


logging:
  include-application-name: false # for tracing
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "


# Application properties
application:
  id: "${spring.application.name}-${application.node-id:00}-${application.instance-id:${random.value}}"
  instance-id: "01"
  api:
    version: "v1"
