services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    ports:
      - 21621:9090
    volumes:
      - prometheus-data:/prometheus
      - ./settings/prometheus.yml:/etc/prometheus/prometheus.yml
    environment:
      - TZ=Asia/Seoul
    command: 
      - '--web.enable-admin-api'
      - '--web.enable-lifecycle'
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: on-failure

  loki:
    image: grafana/loki:latest
    container_name: loki
    hostname: loki
    ports:
      - 21632:3100
      - 21633:9096
    volumes:
      - loki-data:/loki
      - ./settings/loki-config.yaml:/etc/loki/local-config.yaml
    environment:
      - TZ=Asia/Seoul
    restart: on-failure

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    ports:
      - 21631:3000
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - prometheus
      - loki
    restart: on-failure

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  default:
    name: im-net
    external: true
