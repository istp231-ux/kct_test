services:

  trace-storage:
    image: elasticsearch:9.4.2
    container_name: trace-storage
    hostname: trace-storage
    ports:
      - 20661:9200 # API for HTTP
      - 20662:9300 # Custom binary protocol
    volumes:
      - trace-data:/usr/share/elasticsearch/data
    environment:
      - TZ=Asia/Seoul
      - node.name=trace-storage
      - cluster.name=trace-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: on-failure


  trace-server:
    image: jaegertracing/jaeger:latest
    container_name: trace-server
    hostname: trace-server
    ports:
      - 21661:16686 # the jaeger UI 
      - 21662:4317 # the OpenTelemetry collector gRPC 
      - 21663:4318 # the OpenTelemetry collector HTTP 
      - 21664:8888 # promethus metric
    volumes:
      - ./settings:/jaeger
    environment:
      - TZ=Asia/Seoul
      - JAEGER_DISABLED=true
    command:
      - "--config=/jaeger/config.yaml"
    depends_on:
      - trace-storage
    restart: on-failure

volumes:
  trace-data:
    driver: local

networks:
  default:
    name: im-net
    external: true

